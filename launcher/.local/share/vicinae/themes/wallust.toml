# Wallust generated Vicinae theme

[meta]
version = 1
name = "Wallust"
description = "Dynamic colors from wallpaper"
variant = "dark"

[colors.core]
background = "#212124"
foreground = "#EBE7E9"
secondary_background = "#47474B"
border = "#999497"
accent = "#8195AF"

[colors.accents]
blue = "#8195AF"
green = "#585A75"
magenta = "#8FC1C2"
orange = "#9D82A2"
purple = "#8FC1C2"
red = "#1E2031"
yellow = "#9D82A2"
cyan = "#C7BAC1"

[colors.list.item.selection]
background = { name = "#8195AF", opacity = 0.3 }
secondary_background = "#999497"
foreground = "#8195AF"

[colors.list.item.hover]
background = { name = "#8195AF", opacity = 0.15 }
