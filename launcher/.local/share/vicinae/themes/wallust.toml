# Wallust generated Vicinae theme

[meta]
version = 1
name = "Wallust"
description = "Dynamic colors from wallpaper"
variant = "dark"

[colors.core]
background = "#000101"
foreground = "#E9EAEA"
secondary_background = "#000101"
border = "#969797"
accent = "#70823C"

[colors.accents]
blue = "#70823C"
green = "#714D3B"
magenta = "#E3B65F"
orange = "#647A7F"
purple = "#E3B65F"
red = "#2A3537"
yellow = "#647A7F"
cyan = "#BFC2C2"

[colors.list.item.selection]
background = { name = "#70823C", opacity = 0.3 }
secondary_background = "#969797"
foreground = "#70823C"

[colors.list.item.hover]
background = { name = "#70823C", opacity = 0.15 }
