# Wallust generated Vicinae theme

[meta]
version = 1
name = "Wallust"
description = "Dynamic colors from wallpaper"
variant = "dark"

[colors.core]
background = "#2E2D2D"
foreground = "#DEE3DF"
secondary_background = "#535252"
border = "#8B908C"
accent = "#406B8D"

[colors.accents]
blue = "#406B8D"
green = "#9D3B37"
magenta = "#D3760C"
orange = "#646942"
purple = "#D3760C"
red = "#322C2C"
yellow = "#646942"
cyan = "#A0AEA3"

[colors.list.item.selection]
background = { name = "#406B8D", opacity = 0.3 }
secondary_background = "#8B908C"
foreground = "#406B8D"

[colors.list.item.hover]
background = { name = "#406B8D", opacity = 0.15 }
