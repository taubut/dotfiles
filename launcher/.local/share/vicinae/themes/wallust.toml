# Wallust generated Vicinae theme

[meta]
version = 1
name = "Wallust"
description = "Dynamic colors from wallpaper"
variant = "dark"

[colors.core]
background = "#2C2E32"
foreground = "#ECEFF5"
secondary_background = "#515257"
border = "#9A9CA2"
accent = "#6D7987"

[colors.accents]
blue = "#6D7987"
green = "#42472B"
magenta = "#C29C7A"
orange = "#7E5245"
purple = "#C29C7A"
red = "#242E41"
yellow = "#7E5245"
cyan = "#C9D0E2"

[colors.list.item.selection]
background = { name = "#6D7987", opacity = 0.3 }
secondary_background = "#9A9CA2"
foreground = "#6D7987"

[colors.list.item.hover]
background = { name = "#6D7987", opacity = 0.15 }
